# Alembic configuration for the wren backend.
#
# Migrations run as an explicit pre-traffic deploy step (`alembic upgrade head`),
# never at app startup. The database URL is NOT set here: env.py
# reads DATABASE_URL from wren settings so there is one source of truth.

[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os

# sqlalchemy.url is intentionally omitted; env.py injects it from settings.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
