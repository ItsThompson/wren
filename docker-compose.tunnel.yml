# =============================================================================
# Cloudflare Tunnel overlay.
#
# Layered ON TOP of docker-compose.yml at DEPLOY TIME ONLY:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml \
#     --profile tunnels up -d
# scripts/deploy.sh drives this. The tunnel is the ONLY ingress on the VPS;
# locally the stack runs without it (the base file defines no cloudflared), and
# the `tunnels` profile keeps cloudflared from ever starting outside a deploy.
#
# Kept separate from docker-compose.yml so the base stack stays a
# self-contained, tunnel-free local artifact and the ingress lives with the
# rest of the deploy machinery.
# =============================================================================
name: wren

services:
  cloudflared:
    # Pinned third-party image; review quarterly and check release notes.
    image: cloudflare/cloudflared:2026.7.1
    profiles: [tunnels]
    command: tunnel --config /etc/cloudflared/config.yml run
    # Rendered ingress config + named-tunnel credentials, both read-only.
    # deploy.sh renders config.rendered.yml (envsubst) and copies
    # credentials.json (chmod 600); both are gitignored.
    volumes:
      - ./deployments/cloudflare/config.rendered.yml:/etc/cloudflared/config.yml:ro
      - ./deployments/cloudflare/credentials.json:/etc/cloudflared/credentials.json:ro
    networks:
      - edge-net
    depends_on:
      - frontend
      - backend
      - mcp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  # The OAuth AS signing key is a mounted secret: the
  # operator places the PEM on the host at OAUTH_PRIVATE_KEY_PATH (chmod 600) at
  # bring-up, and deploy.sh asserts it exists before starting the stack. Bind-mount
  # it read-only at the SAME path inside the container, so the app opens it at
  # exactly the OAUTH_PRIVATE_KEY_PATH it already reads from .env (one value; host
  # path == container path). Without this the AS fails fast on boot outside
  # development and the deploy health gate rolls back. Deploy-only (this overlay):
  # local `just up` and the CI e2e stack run ENVIRONMENT=development and generate
  # an ephemeral in-memory key, so the base file mounts nothing.
  backend:
    volumes:
      - ${OAUTH_PRIVATE_KEY_PATH:?set OAUTH_PRIVATE_KEY_PATH in /opt/wren/.env at bring-up (see docs/runbooks/bring-up.md)}:${OAUTH_PRIVATE_KEY_PATH}:ro

# edge-net is defined in the base file; redeclared here (identical) so the
# overlay is self-consistent when merged.
networks:
  edge-net:
    driver: bridge
