# =============================================================================
# Cloudflare Tunnel overlay.
#
# Layered ON TOP of docker-compose.yml at DEPLOY TIME ONLY:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml \
#     --profile tunnels up -d
# scripts/deploy.sh drives this. The tunnel is the ONLY ingress on the VPS;
# locally the stack runs without it (the base file defines no cloudflared), and
# the `tunnels` profile keeps cloudflared from ever starting outside a deploy.
#
# Kept separate from docker-compose.yml so the base stack stays a
# self-contained, tunnel-free local artifact and the ingress lives with the
# rest of the deploy machinery.
# =============================================================================
name: wren

services:
  cloudflared:
    # Pinned third-party image; review quarterly and check release notes.
    image: cloudflare/cloudflared:2026.7.1
    profiles: [tunnels]
    command: tunnel --config /etc/cloudflared/config.yml run
    # Rendered ingress config is not sensitive; named-tunnel credentials are a
    # Compose secret populated by deploy.sh from the chmod 600 source file.
    volumes:
      - ./deployments/cloudflare/config.rendered.yml:/etc/cloudflared/config.yml:ro
    secrets:
      - source: cloudflared_credentials
        target: /etc/cloudflared/credentials.json
        uid: "${WREN_CLOUDFLARED_UID:-65532}"
        gid: "${WREN_CLOUDFLARED_GID:-65532}"
        mode: 0400
    networks:
      - edge-net
    depends_on:
      - frontend
      - backend
      - mcp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  # The OAuth AS signing key is a Compose secret: the operator places the PEM on
  # the host at OAUTH_PRIVATE_KEY_PATH (chmod 600) at bring-up, and deploy.sh
  # feeds it to Compose without changing the source file owner. The backend reads
  # the container-only secret path below instead of the host path from .env.
  # Deploy-only (this overlay): local `just up` and the CI e2e stack run
  # ENVIRONMENT=development and generate an ephemeral in-memory key, so the base
  # file mounts nothing.
  backend:
    environment:
      OAUTH_PRIVATE_KEY_PATH: /run/secrets/oauth_private_key
    secrets:
      - source: oauth_private_key
        target: /run/secrets/oauth_private_key
        uid: "${WREN_BACKEND_UID:-999}"
        gid: "${WREN_BACKEND_GID:-999}"
        mode: 0400

  alertmanager:
    secrets:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
        uid: "${WREN_ALERTMANAGER_UID:-65534}"
        gid: "${WREN_ALERTMANAGER_GID:-65534}"
        mode: 0400

# edge-net is defined in the base file; redeclared here (identical) so the
# overlay is self-consistent when merged.
networks:
  edge-net:
    driver: bridge

# Environment-backed secrets are intentional: Docker Compose local file secrets
# ignore uid/gid/mode because they are bind mounts, but environment secrets honor
# the per-service ownership/mode below.
secrets:
  oauth_private_key:
    environment: WREN_OAUTH_PRIVATE_KEY
  cloudflared_credentials:
    environment: WREN_CLOUDFLARED_CREDENTIALS
  alertmanager_config:
    environment: WREN_ALERTMANAGER_CONFIG
