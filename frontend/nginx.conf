# Wren SPA served by nginx (spec sections 10/11): static assets plus a
# history-API fallback so client-side routes resolve, fronted by the tunnel
# (usewren.com). The SPA calls the API cross-origin (api.usewren.com); nginx
# serves static files only, no reverse proxy.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets are immutable: cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entry: any unmatched path serves index.html so react-router's browser
    # history routes (e.g. /roadmaps/:id, /authorize) resolve on deep links and
    # reloads. The HTML entry itself is never cached so new deploys take effect.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Liveness/readiness for the compose health gate (spec section 11). Local to
    # the container; the tunnel does not route this path.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
