# =============================================================================
# Alertmanager config for the Wren stack.
#
# The three critical alerts (ServiceDown, HostDiskAlmostFull, HighErrorRate) all
# fan to one Discord receiver with send_resolved, so an operator sees both the
# firing and the recovery. There is no Grafana at P0; Discord is the only sink.
#
# TEMPLATING: `${DISCORD_WEBHOOK_URL}` is a deploy-time placeholder. Alertmanager
# does not expand environment variables, so scripts/deploy.sh renders this file to
# alertmanager.rendered.yml on the VPS (envsubst substitutes ONLY that token, then
# chmod 600), and the compose alertmanager service mounts the rendered file. The
# single-var envsubst allow-list leaves the Go templating (`{{ ... }}`) in
# title/message untouched, so those render at alert time. Keep the placeholder in
# this committed file; the rendered file is gitignored; never commit a real webhook.
# =============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: discord
  # Group by the alert and its job so one Discord message covers a burst.
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
        message: '{{ range .Alerts }}{{ .Annotations.summary }}{{ if .Annotations.description }} — {{ .Annotations.description }}{{ end }}
{{ end }}'
