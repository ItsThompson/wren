# =============================================================================
# Wren production-shaped stack.
#
# Every service is expose-only (NO host `ports:`): the Cloudflare tunnel is the
# only ingress and is added by the tunnel overlay (locally the stack runs
# without it). Four segmented bridge networks isolate the tiers; Postgres lives
# on data-net alone and the internal app (:8001) is never on edge-net.
#
# Local development layers docker-compose.dev.yml on top (bind mounts, --reload,
# relaxed cookies, in-network public URLs, host-published Postgres): see
# `just up-dev`. This base file is the deployable artifact the deploy and
# monitoring tooling operate on.
#
# Image version pinning: third-party images are pinned to exact tags. Review
# quarterly; check release notes before bumping.
#
# Project name is `wren` here and `wren-dev` in the dev overlay, so the two run
# under separate volume/network namespaces (wren_pgdata vs wren-dev_pgdata):
# always drive them through the paired justfile recipes (`just up`/`just down`
# vs `just up-dev`/`just dev-infra`), not a bare `docker compose` mixing the two.
# =============================================================================
name: wren

services:
  # ---------------------------------------------------------------------------
  # Edge tier
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GHCR_OWNER:-wren-platform}/wren/frontend:${WREN_IMAGE_TAG:-latest}
    build:
      # Repo-root context so the build can reach the shared shared/theme/*.css
      # (imported by the SPA). The per-package frontend/.dockerignore no longer
      # applies; the repo-root .dockerignore keeps the context lean.
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the SPA bundle at build time: the API origin the SPA calls
        # cross-origin (api.usewren.com in prod). Empty means same-origin.
        VITE_API_BASE_URL: ${PUBLIC_BASE_URL:-}
        # The MCP server origin (mcp.usewren.com in prod); the onboarding wizard
        # displays the MCP endpoint derived from it.
        VITE_MCP_BASE_URL: ${MCP_PUBLIC_URL:-}
    expose:
      - "80"
    networks:
      - edge-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  docs:
    image: ghcr.io/${GHCR_OWNER:-wren-platform}/wren/docs:${WREN_IMAGE_TAG:-latest}
    build:
      # Repo-root context so the build can reach the shared shared/theme/*.css
      # (imported by the custom VitePress theme). Same rationale as frontend.
      context: .
      dockerfile: docs-site/Dockerfile
    expose:
      - "80"
    networks:
      - edge-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Compute tier
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GHCR_OWNER:-wren-platform}/wren/backend:${WREN_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      # Secrets, TTLs, pinned public URLs, CORS. Absent locally is fine: the
      # in-network overrides below plus dev defaults keep the app bootable.
      - path: .env
        required: false
    environment:
      # In-network endpoints override any host-oriented .env values: inside the
      # stack the DB is reached by service name, never localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wren}:${POSTGRES_PASSWORD:-wren}@postgres:5432/${POSTGRES_DB:-wren}
      HOST: 0.0.0.0
    expose:
      - "8000"  # external app (tunnel-routed as api.usewren.com)
      - "8001"  # internal app (compute-net only; never tunnel-routed)
    networks:
      - edge-net
      - compute-net
      - data-net
      - monitoring-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The venv interpreter probes BOTH apps' readiness (external :8000 +
      # internal :8001): the container is healthy only when both serve. urlopen
      # raises on non-2xx (a 503 not-ready) and on connection refusal, both ->
      # unhealthy. (serve.sh also takes the container down if either app exits.)
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/readyz', timeout=3); u.urlopen('http://127.0.0.1:8001/readyz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M  # Python floor needs more headroom than a comparable Go service.
    restart: unless-stopped

  mcp:
    image: ghcr.io/${GHCR_OWNER:-wren-platform}/wren/mcp:${WREN_IMAGE_TAG:-latest}
    build:
      context: ./mcp
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      # Tool calls forward to the internal app over compute-net by service name.
      # Token issuer/audience (PUBLIC_BASE_URL / MCP_PUBLIC_URL) stay the pinned
      # public URLs from .env in production; the dev overlay points them
      # in-network for a self-contained local stack.
      BACKEND_INTERNAL_URL: http://backend:8001
      HOST: 0.0.0.0
    expose:
      - "9000"  # PRM + /mcp transport tunnel-routed; /metrics + health are not.
    networks:
      - edge-net
      - compute-net
      - monitoring-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/readyz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Data tier
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wren}
      POSTGRES_DB: ${POSTGRES_DB:-wren}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - data-net  # data-net exclusively: never reachable from the edge.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wren} -d ${POSTGRES_DB:-wren}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability tier (monitoring-net only; never edge).
  # Containers + networks + volumes land here; the scrape/alert config lives in
  # deployments/prometheus and deployments/alertmanager.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=3d"
      - "--storage.tsdb.retention.size=2GB"
      - "--query.max-concurrency=5"
      - "--query.timeout=30s"
    expose:
      - "9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_alerts
        target: /etc/prometheus/alerts.yml
    volumes:
      - promdata:/prometheus
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1024M
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9100/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    # Gated behind the `tunnels` profile (the only profile the deploy activates).
    # Alertmanager v0.27 EXITS on config load if webhook_url is not a valid URL,
    # and the committed alertmanager.yml keeps the unrendered ${DISCORD_WEBHOOK_URL}
    # placeholder, so CI renders it (envsubst) into WREN_ALERTMANAGER_CONFIG and
    # docker-compose.tunnel.yml delivers it as an environment-sourced Compose
    # secret. Without the profile gate, local `just up`/`up-dev` (no profile) would
    # crash-loop this restart:unless-stopped + healthchecked container. In the real
    # deploy the profile is active and the rendered config supplies a valid webhook,
    # so it boots; local dev skips it (Prometheus + node-exporter still run).
    profiles: ["tunnels"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    expose:
      - "9093"
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

networks:
  edge-net:
    driver: bridge
  compute-net:
    driver: bridge
  data-net:
    driver: bridge
  monitoring-net:
    driver: bridge

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata:
  promdata:

# -----------------------------------------------------------------------------
# Configs (environment-sourced; delivered CLI-side, never bind-mounted)
#
# Prometheus config + alerts are non-secret but must reach the container without
# a bind mount: over an SSH Docker Context a file:/bind source resolves on the
# daemon host (the VPS has no checkout). The content is read CLI-side and
# transmitted to the daemon. Locally and in CI the recipes populate
# WREN_PROMETHEUS_CONFIG/_ALERTS from the committed deployments/prometheus/*.yml
# files (`just up`/`up-dev`/`e2e-up`; the CI e2e job exports them explicitly), so
# the base stack stays bootable against a local daemon.
# -----------------------------------------------------------------------------
configs:
  prometheus_config:
    environment: WREN_PROMETHEUS_CONFIG
  prometheus_alerts:
    environment: WREN_PROMETHEUS_ALERTS
