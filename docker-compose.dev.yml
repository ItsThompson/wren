# Wren dev overrides. Layered ON TOP of docker-compose.yml (never standalone):
# `just up-dev` runs the full stack locally with bind mounts, --reload, relaxed
# cookies and in-network public URLs; `just dev-infra` brings up only a
# host-published Postgres for the host-run inner loop (`just dev-api`, migrate,
# tests). Prod values (expose-only, pinned public URLs) stay in the base file.
name: wren-dev

services:
  backend:
    environment:
      ENVIRONMENT: development          # relaxed cookies: Secure off, host-only
      UVICORN_RELOAD: "true"            # serve.sh adds --reload to both apps
      PUBLIC_BASE_URL: http://backend:8000    # in-network AS origin for local runs
      APP_PUBLIC_URL: http://localhost:5173
      MCP_PUBLIC_URL: http://localhost:9000
    volumes:
      # Bind source over the image's editable install so --reload picks up edits.
      # Paths mirror the image layout (/app/backend) now that the build context
      # is the repo root.
      - ./backend/src:/app/backend/src
      - ./backend/alembic:/app/backend/alembic

  mcp:
    # Run uvicorn with --reload directly (the prod CMD is the non-reload console
    # script); bind-mount source so reload sees edits.
    command: ["uvicorn", "wren_mcp.main:app", "--host", "0.0.0.0", "--port", "9000", "--reload"]
    environment:
      ENVIRONMENT: development
      PUBLIC_BASE_URL: http://backend:8000    # reach the AS JWKS in-network
      MCP_PUBLIC_URL: http://localhost:9000
    volumes:
      - ./mcp/src:/app/mcp/src

  postgres:
    # Publish to the host so host-run recipes (just dev-api, just migrate, the
    # test suite) reach it at localhost:5432. Prod is expose-only (base file).
    ports:
      - "5432:5432"
