name: CI

# Runs on every push and on PRs into main. The
# lint job runs first and gates the three test jobs; codegen-drift is
# independent. Coverage gates are hard: backend 80%, frontend 70%.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # lint: static checks for all three packages. Gates the test jobs so a broken
  # format/type error fails fast before the (slower) test matrix runs.
  #   backend/mcp -> ruff check + ruff format --check + mypy
  #   frontend    -> tsc (typecheck) + oxlint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (backend + mcp)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend lint (ruff + mypy)
        working-directory: backend
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy

      - name: MCP lint (ruff + mypy)
        working-directory: mcp
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck + lint
        working-directory: frontend
        run: |
          npx tsc -b
          npm run lint

  # ---------------------------------------------------------------------------
  # codegen-drift: regenerate the OpenAPI document from the live FastAPI app and
  # the TS client from it, then fail if the committed client is stale (sections
  # 06/13). Independent of lint: it guards a frozen contract, not code style.
  # Mirrors `just codegen`.
  # ---------------------------------------------------------------------------
  codegen-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (backend)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Regenerate OpenAPI -> TS client
        run: |
          cd backend
          LOG_LEVEL=critical uv run python -c "import json; from wren.api.main import app; print(json.dumps(app.openapi(), indent=2))" > ../frontend/openapi.json
          cd ../frontend
          npm run codegen

      - name: Fail on stale committed client
        run: git diff --exit-code -- frontend/openapi.json frontend/src/api/schema.d.ts

  # ---------------------------------------------------------------------------
  # contract-drift: run the dev/test-only `contract/` uv project, the only
  # interpreter where `wren.*` and `wren_mcp.*` import together (it editable
  # path-installs both packages; neither deployable depends on the other, per
  # section 12). It guards the cross-package frozen contract: the internal-
  # boundary header constants and the backend<->MCP schema mirror (Group A shapes
  # asserted field-equal, the lean write results asserted a fields-subset). An
  # independent failure signal, gated by lint like the test jobs; not folded into
  # the isolated-venv test-backend steps. Mirrors codegen-drift's frozen-contract-
  # guard shape.
  # ---------------------------------------------------------------------------
  contract-drift:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Contract drift (cross-package header constants + schema mirror)
        working-directory: contract
        run: |
          uv sync --frozen
          uv run pytest

  # ---------------------------------------------------------------------------
  # test-backend: pytest with the hard 80% coverage gate over the backend, plus
  # the MCP suite (tool-schema snapshot + tool contract tests). Real Postgres is
  # started per-test by testcontainers-python (Docker is present on the runner),
  # covering the DB integration, OAuth/Authlib flow, and MCP layers. Gated by
  # lint.
  # ---------------------------------------------------------------------------
  test-backend:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Backend tests (pytest + 80% coverage gate, Postgres via testcontainers)
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest

      - name: MCP tests (tool-schema snapshot + tool contract, 80% coverage gate)
        working-directory: mcp
        run: |
          uv sync --frozen
          uv run pytest

  # ---------------------------------------------------------------------------
  # test-frontend: vitest with the hard 70% coverage gate (the thresholds in
  # vite.config.ts fail the run below the floor). Gated by lint.
  # ---------------------------------------------------------------------------
  test-frontend:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Vitest + 70% coverage gate
        working-directory: frontend
        run: npm run test:coverage

  # ---------------------------------------------------------------------------
  # e2e: build and boot the production-shaped Compose stack (with the e2e overlay
  # that publishes the frontend + backend ports and relaxes cookies), run the
  # pre-traffic migrations, then drive the spine with Playwright (workers:1,
  # fullyParallel:false). Gated by lint.
  # ---------------------------------------------------------------------------
  e2e:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # docker compose reads COMPOSE_FILE natively (':'-separated), so every
    # `docker compose ...` below layers the e2e overlay without repeating -f.
    env:
      COMPOSE_FILE: docker-compose.yml:e2e/docker-compose.e2e.yml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Run pre-traffic migrations
        run: docker compose run --rm backend alembic upgrade head

      - name: Run Playwright spine + smoke
        working-directory: e2e
        run: npx playwright test
        env:
          CI: true

      - name: Capture stack logs on failure
        if: failure()
        run: docker compose logs --no-color > /tmp/wren-stack-logs.txt 2>&1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stack-logs
          path: /tmp/wren-stack-logs.txt
          retention-days: 7

      - name: Stop the stack
        if: always()
        run: docker compose down -v
