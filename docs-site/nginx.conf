# Wren docs site served by nginx (spec section 04): VitePress static output plus
# a history-API fallback so client-side doc routes resolve on deep links and
# reloads, fronted by the tunnel (docs.usewren.com). nginx serves static files
# only. Mirrors frontend/nginx.conf.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets are immutable: cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Root redirect: docs.usewren.com/ has no landing page, so send visitors
    # straight to the guide (US-DOCS-01). Exact-match (`= /`) so it fires only on
    # the bare root; deep links, clean URLs, and the history fallback below are
    # untouched. A server-side 302 avoids any client-side flash.
    location = / {
        return 302 /getting-started;
    }

    # Docs entry: VitePress emits one pre-rendered .html per page and uses clean
    # URLs (/getting-started). $uri.html serves the correct page directly on a
    # deep link/refresh (no home-page flash); the final /index.html is the
    # history fallback so any client-side route still resolves (US-DOCS-01). The
    # HTML entry is never cached so new deploys take effect.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Liveness/readiness for the compose health gate. Local to the container; the
    # tunnel does not route this path.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
